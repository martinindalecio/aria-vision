# Syncs this project's .portfolio.json to Martin's portfolio (martingalaz.com)
# via Airtable. Requires two repo secrets (Settings → Secrets → Actions):
#   AIRTABLE_TOKEN   — Airtable PAT (scopes: data.records:read, data.records:write)
#   AIRTABLE_BASE_ID — portfolio base id (starts with "app...")

name: Sync to Portfolio

on:
  push:
    branches: [main]
    paths:
      - '.portfolio.json'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync to Airtable
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error, sys

          with open('.portfolio.json') as f:
              p = json.load(f)

          fields = {
              "name":           p["name"],
              "status":         p.get("status", "Prototype"),
              "year":           p.get("year", ""),
              "tags":           p.get("tags", []),
              "description_en": p.get("description", {}).get("en", ""),
              "description_es": p.get("description", {}).get("es", ""),
          }
          if p.get("url"):
              fields["url"] = p["url"]

          payload = {
              "performUpsert": {"fieldsToMergeOn": ["name"]},
              "records": [{"fields": fields}],
          }

          base_id = os.environ["AIRTABLE_BASE_ID"]
          token   = os.environ["AIRTABLE_TOKEN"]
          url     = f"https://api.airtable.com/v0/{base_id}/Projects"

          req = urllib.request.Request(
              url,
              data=json.dumps(payload).encode(),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              },
              method="PATCH",
          )

          try:
              with urllib.request.urlopen(req) as res:
                  result  = json.loads(res.read())
                  created = result.get("createdRecords", [])
                  action  = "Created" if created else "Updated"
                  print(f"✅ {action}: {p['name']}")
          except urllib.error.HTTPError as e:
              print(f"❌ Airtable error {e.code}: {e.read().decode()}", file=sys.stderr)
              sys.exit(1)
          PYEOF
